<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Image Annotation Study</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Image Annotation Study</h1>
        <p id="statusText">annotator를 선택하세요.</p>
      </div>
      <div class="controls">
        <select id="annotatorSelect" aria-label="Annotator"></select>
        <button id="prevPage" type="button">이전</button>
        <button id="nextPage" type="button">다음</button>
        <button id="downloadCsv" type="button">CSV 백업</button>
      </div>
    </header>

    <main>
      <section class="progress">
        <div>
          <strong id="pageLabel">Page - / -</strong>
          <span id="themeLabel"></span>
        </div>
        <div id="progressLabel"></div>
      </section>

      <section id="taskGrid" class="task-grid"></section>
    </main>

    <footer class="footer">
      <span>응답: 예 / 아니오 / 애매함</span>
      <span>키보드: 왼쪽=아니오, 아래=애매함, 오른쪽=예</span>
      <span>클릭한 질문 줄이 키보드 입력 대상입니다.</span>
    </footer>

    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
